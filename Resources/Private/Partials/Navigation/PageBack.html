<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:variable name="condition" value="{f:if(condition: '{{viewData.requestData.page + 0} > {viewData.requestData.double + 1}}', then: 1, else: 0)}" />
<f:variable name="page" value="{viewData.requestData.page - 1 - viewData.requestData.double}" />

<f:render partial="Navigation/Page" arguments="{class: 'tx-dlf-navigation-prev', condition: condition, page: page, value: 'prevPage', viewData: viewData}" />

</html>
